server.port=8080

# H2 Database Configuration (Relational in-memory)
spring.datasource.url=jdbc:h2:file:./data/torneos_ajedrez
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Web Console to replace pgAdmin
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# CORS (Para simplificar en API Basica)
spring.mvc.cors.allowed-origins=*

# Email Configuration (Placeholder - User should update these)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu-correo@gmail.com
spring.mail.password=tu-contraseña-de-aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

